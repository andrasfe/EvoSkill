name: Devin on Issue

on:
  issues:
    types: [labeled]

concurrency:
  group: devin-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  start-devin:
    if: github.event.label.name == 'devin-approved'
    runs-on: ubuntu-latest

    steps:
      - name: Start Devin session
        id: create-session
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          ISSUE_TITLE=$(jq -r '.issue.title // ""' "$GITHUB_EVENT_PATH")
          ISSUE_BODY=$(jq -r '.issue.body // ""' "$GITHUB_EVENT_PATH")

          PROMPT="Work on GitHub issue #${ISSUE_NUMBER} in the ${REPO} repository.

          Issue title: ${ISSUE_TITLE}

          Issue description:
          ${ISSUE_BODY}

          Please open a PR when done."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions" \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg prompt "$PROMPT" '{"prompt": $prompt}')")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            SESSION_URL=$(echo "$BODY" | jq -r '.url')
            echo "session_url=${SESSION_URL}" >> "$GITHUB_OUTPUT"
            echo "Devin session started: ${SESSION_URL}"
          else
            echo "::error::Failed to create Devin session (HTTP ${HTTP_CODE}): ${BODY}"
            exit 1
          fi

      - name: Comment on issue with session link
        uses: actions/github-script@v7
        env:
          SESSION_URL: ${{ steps.create-session.outputs.session_url }}
        with:
          script: |
            const sessionUrl = process.env.SESSION_URL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**Devin session started!**\n\nDevin is now working on this issue.\n\n[View Devin session](${sessionUrl})`
            });
